<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isometric Tech | Inventory & Supply Portal</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0d1117;
            color: #e6edf3;
        }

        /* Navigation Bar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
        }

        .brand {
            font-weight: bold;
            font-size: 20px;
            color: #58a6ff;
            text-transform: uppercase;
        }

        /* Search Area */
        .search-container {
            display: flex;
            flex-grow: 1;
            justify-content: center;
            padding: 0 50px;
        }

        input[type="text"] {
            width: 100%;
            max-width: 500px;
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: white;
        }

        /* Hero / Main Section */
        header {
            height: 60vh;
            background: linear-gradient(rgba(13, 17, 23, 0.8), rgba(13, 17, 23, 0.8)), url('gym-hero.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #30363d;
        }

        h2 { font-size: 2rem; margin-bottom: 20px; }

        /* Category Buttons */
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(3, 150px);
            gap: 20px;
            margin-top: 10px;
        }

        .category-card {
            background: #21262d;
            border: 1px solid #30363d;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
        }

        .category-card:hover {
            border-color: #58a6ff;
            background: #30363d;
        }

        /* Bottom Section / Status */
        .status-bar {
            padding: 20px 40px;
            display: flex;
            justify-content: space-around;
            background: #161b22;
            font-size: 0.9rem;
            color: #8b949e;
        }

        .status-item span { color: #58a6ff; font-weight: bold; }

    </style>
</head>
<body>

    <nav>
        <div class="brand">Isometric Portal</div>
        <div class="search-container">
            <input type="text" placeholder="Search equipment, SKU, or material specs...">
        </div>
        <div style="color: #8b949e;">Admin_User_01</div>
    </nav>

    <header>
        <h2>Product Database</h2>
        <p>Select a category to view specifications and material costs.</p>
        
        <div class="filter-grid">
            <div class="category-card">Strength Gear</div>
            <div class="category-card">Cardio Units</div>
            <div class="category-card">Raw Materials</div>
            <div class="category-card">Inventory</div>
            <div class="category-card">Suppliers</div>
            <div class="category-card">Analysis</div>
        </div>
    </header>

    <div class="status-bar">
        <div class="status-item">System Status: <span>Operational</span></div>
        <div class="status-item">Last Database Update: <span>April 2026</span></div>
        <div class="status-item">Current Market Trend: <span>Steel Volatility Alert</span></div>
    </div>

</body>
</html>
