<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isometric Tech Gym | Executive Portal</title>
    <style>
        /* ALL CSS IS NOW INSIDE THIS BLOCK */
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0a0e14;
            color: white;
            overflow-x: hidden;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 2px solid #007bff;
        }

        .logo {
            font-weight: 800;
            font-size: 24px;
            color: #007bff;
            letter-spacing: 1px;
        }

        ul { 
            display: flex; 
            list-style: none; 
            margin: 0;
            padding: 0;
        }

        ul li { margin-left: 30px; }

        ul li a { 
            color: white; 
            text-decoration: none; 
            font-weight: 500;
            transition: 0.3s;
        }

        ul li a:hover { color: #007bff; }

        header {
            height: 90vh;
            /* This links to your equipment photo */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('gym-hero.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .hero-content { max-width: 800px; padding: 20px; }

        h1 { 
            font-size: 4rem; 
            margin-bottom: 10px; 
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p { 
            font-size: 1.4rem; 
            color: #bdc3c7; 
            margin-bottom: 40px; 
            line-height: 1.6;
        }

        .btn {
            padding: 18px 40px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">ISOMETRIC TECH GYM</div>
        <ul>
            <li><a href="#">Market Analysis</a></li>
            <li><a href="#">Cost Strategy</a></li>
            <li><a href="#">Supply Chain</a></li>
        </ul>
    </nav>

    <header>
        <div class="hero-content">
            <h1>Engineering Peak Performance</h1>
            <p>Innovative Strength Solutions & Industrial Optimization.<br>
            Addressing the 2026 Strategic Deficit.</p>
            <button class="btn">Access Board Report</button>
        </div>
    </header>

</body>
</html>
